<body>

<div class="ai-screen">

<script>
// =============================================
// BACKGROUND CANVAS — animated grid + particles
// =============================================
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * 2000, y: Math.random() * 2000,
      vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
      r: Math.random()*1.5+0.5, a: Math.random()
    });
  }

  function drawGrid() {
    ctx.strokeStyle = 'rgba(0,255,81,0.04)';
    ctx.lineWidth = 1;
    const spacing = 60;
    for (let x = 0; x < W; x += spacing) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for (let y = 0; y < H; y += spacing) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
  }

  function animate() {
    ctx.clearRect(0,0,W,H);
    drawGrid();
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x<0) p.x=W; if (p.x>W) p.x=0;
      if (p.y<0) p.y=H; if (p.y>H) p.y=0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,255,81,${0.2+p.a*0.3})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();
})();

// =============================================
// 3D AVATAR — Three.js holographic head
// =============================================
(function() {
  const canvas = document.getElementById('avatar-canvas');
  const W = canvas.offsetWidth || 380;
  const H = canvas.offsetHeight || 380;
  canvas.width = W; canvas.height = H;

  // We'll render a custom canvas-based 3D wireframe avatar
  // since Three.js isn't available as a local file
  const ctx = canvas.getContext('2d');
  let angle = 0;
  let bobY = 0;
  let bobT = 0;
  let isSpeaking = false;

  window.setAvatarSpeaking = function(val) { isSpeaking = val; };

  // Build a simple icosphere-style head wireframe
  function projectPoint(x, y, z, rotY, cx, cy) {
    const cosA = Math.cos(rotY), sinA = Math.sin(rotY);
    const rx = x * cosA - z * sinA;
    const rz = x * sinA + z * cosA;
    const fov = 280;
    const dist = 5 + rz;
    const px = cx + (rx / dist) * fov;
    const py = cy + bobY + (y / dist) * fov;
    return [px, py, dist];
  }

  function drawHead(rotY) {
    ctx.clearRect(0, 0, W, H);
    const cx = W / 2, cy = H / 2;

    // Glow base
    const grd = ctx.createRadialGradient(cx, cy+bobY, 20, cx, cy+bobY, 160);
    grd.addColorStop(0, 'rgba(0,255,81,0.06)');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Draw head sphere as wireframe latitude/longitude lines
    const R = 100;
    const latLines = 10, lonLines = 12;
    ctx.lineWidth = 0.8;

    // Latitude lines
    for (let i = 1; i < latLines; i++) {
      const phi = (i / latLines) * Math.PI;
      const r = R * Math.sin(phi);
      const yOff = -R * Math.cos(phi);
      const points = [];
      for (let j = 0; j <= lonLines; j++) {
        const theta = (j / lonLines) * Math.PI * 2;
        const px3 = r * Math.cos(theta);
        const pz3 = r * Math.sin(theta);
        const [px, py, dist] = projectPoint(px3, yOff, pz3, rotY, cx, cy);
        points.push([px, py, dist]);
      }
      // Determine front/back
      ctx.beginPath();
      points.forEach(([px, py, dist], idx) => {
        const alpha = Math.max(0, Math.min(0.6, (dist-3)/4));
        if (idx === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.strokeStyle = `rgba(0,255,81,0.25)`;
      ctx.stroke();
    }

    // Longitude lines
    for (let j = 0; j < lonLines; j++) {
      const theta = (j / lonLines) * Math.PI * 2;
      const points = [];
      for (let i = 0; i <= latLines; i++) {
        const phi = (i / latLines) * Math.PI;
        const r = R * Math.sin(phi);
        const yOff = -R * Math.cos(phi);
        const px3 = r * Math.cos(theta);
        const pz3 = r * Math.sin(theta);
        const [px, py, dist] = projectPoint(px3, yOff, pz3, rotY, cx, cy);
        points.push([px, py, dist]);
      }
      ctx.beginPath();
      points.forEach(([px, py], idx) => {
        if (idx === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.strokeStyle = `rgba(0,255,81,0.2)`;
      ctx.stroke();
    }

    // Eyes
    const eyeL = projectPoint(-28, -15, 80, rotY, cx, cy);
    const eyeR = projectPoint(28, -15, 80, rotY, cx, cy);
    [eyeL, eyeR].forEach(([ex, ey, dist]) => {
      if (dist > 4.5) {
        ctx.beginPath();
        ctx.arc(ex, ey, 6, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,255,81,0.9)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex, ey, 10, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(0,255,81,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Eye glow
        const eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, 18);
        eg.addColorStop(0, 'rgba(0,255,81,0.3)');
        eg.addColorStop(1, 'transparent');
        ctx.fillStyle = eg;
        ctx.beginPath(); ctx.arc(ex, ey, 18, 0, Math.PI*2); ctx.fill();
      }
    });

    // Mouth — animates when speaking
    const mouthW = isSpeaking ? 20 + Math.sin(Date.now()*0.015)*8 : 14;
    const mouthH = isSpeaking ? 6 + Math.sin(Date.now()*0.02)*4 : 2;
    const mouthC = projectPoint(0, 30, 85, rotY, cx, cy);
    if (mouthC[2] > 4.5) {
      ctx.beginPath();
      ctx.ellipse(mouthC[0], mouthC[1], mouthW, mouthH, 0, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,255,81,0.7)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      if (isSpeaking) {
        ctx.fillStyle = 'rgba(0,255,81,0.15)';
        ctx.fill();
      }
    }

    // Neck / collar
    const neckTop = projectPoint(0, 110, 60, rotY, cx, cy);
    const neckR1 = projectPoint(-20, 120, 55, rotY, cx, cy);
    const neckR2 = projectPoint(20, 120, 55, rotY, cx, cy);
    ctx.beginPath();
    ctx.moveTo(neckR1[0], neckR1[1]);
    ctx.lineTo(neckTop[0], neckTop[1]);
    ctx.lineTo(neckR2[0], neckR2[1]);
    ctx.strokeStyle = 'rgba(0,255,81,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Data overlay — scan lines across face
    const scanY = ((Date.now() % 3000) / 3000) * H;
    ctx.beginPath();
    ctx.moveTo(0, scanY); ctx.lineTo(W, scanY);
    ctx.strokeStyle = 'rgba(0,255,81,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // HUD bracket corners around face
    const fx = cx - 120, fy = cy - 130, fw = 240, fh = 260;
    const cs = 20;
    ctx.strokeStyle = 'rgba(0,255,81,0.4)'; ctx.lineWidth = 2;
    // TL
    ctx.beginPath(); ctx.moveTo(fx, fy+cs); ctx.lineTo(fx, fy); ctx.lineTo(fx+cs, fy); ctx.stroke();
    // TR
    ctx.beginPath(); ctx.moveTo(fx+fw-cs, fy); ctx.lineTo(fx+fw, fy); ctx.lineTo(fx+fw, fy+cs); ctx.stroke();
    // BL
    ctx.beginPath(); ctx.moveTo(fx, fy+fh-cs); ctx.lineTo(fx, fy+fh); ctx.lineTo(fx+cs, fy+fh); ctx.stroke();
    // BR
    ctx.beginPath(); ctx.moveTo(fx+fw-cs, fy+fh); ctx.lineTo(fx+fw, fy+fh); ctx.lineTo(fx+fw, fy+fh-cs); ctx.stroke();
  }

  function loop() {
    angle += 0.005;
    bobT += 0.02;
    bobY = Math.sin(bobT) * 5;
    drawHead(angle);
    requestAnimationFrame(loop);
  }
  loop();
})();

// =============================================
// CLOCK
// =============================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-ZA', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// =============================================
// AI CHAT
// =============================================
const SYSTEM_PROMPT = `You are a virtual representation of Paul Mukuna Kabeya — a results-driven software engineer based in Johannesburg, South Africa. You ARE Paul speaking directly in first person. Speak naturally, confidently, and warmly as if you are Paul himself answering questions about your life, career, and skills. Never say "Paul" — always say "I". Be concise (2-4 sentences), human, and direct.

BACKGROUND:
- Full-stack software engineer with experience in Java, Python, JavaScript, and Dart (Flutter).
- Transitioned from the humanitarian sector into software engineering.
- Fluent in English and IsiZulu, with moderate Swahili proficiency.
- Based in Johannesburg, South Africa.

EDUCATION (all dates and statuses are exact — do not improvise):
- MIT Emerging Talent — Certificate in Computer and Data Science: COMPLETED December 2025. Covered ML, Python, advanced statistics.
- University of the People — Associate Degree in Computer Science: COMPLETED January 2026 (GPA 3.4). Currently pursuing a Bachelor's Degree in Computer Science there.
- WeThinkCode_ — Computer Systems Certificate: COMPLETED January 2025. Full-stack projects in Java, Python, JS, Dart.
- Southern New Hampshire University — Associate Degree in Business Management: COMPLETED 2024.

When asked about education, always complete your full answer without cutting off. Keep it to 3-4 sentences max.

EXPERIENCE:
- Talent Platform Developer at MIT Emerging Talent (Sep–Dec 2025): led full-stack platform connecting learners with employers, built secure auth, DB, real-time data sync.
- WeThinkCode_ Software Projects (2023–Dec 2024): built apps in Python, Java, web stack; REST APIs, Agile, Docker, Git.
- Africa Focal Point Member at UN Major Group for Children and Youth (Apr 2021–Sep 2022).
- Independent Advocate for Refugee Education in South Africa (2019–2022).

PROJECTS:
- Robot World Simulation (Java, OOP, Algorithms, DB persistence).
- Fitness App (Flutter, Dart, Firebase, REST API, MVC/MVVM).
- Full-Stack Web Applications (React, Flask, Node.js, REST API).
- Banking System (Java, SQLite, user authentication).
- Clock App (Java — alarm, stopwatch, timer).

SKILLS:
- Languages: Python, Java, JavaScript, Dart, SQL, HTML/CSS.
- ML/DS: Machine Learning, NLP, Pandas, NumPy, Scikit-learn, Matplotlib.
- Frameworks/DBs: Flask, Node.js, React, Flutter, MySQL, PostgreSQL, MongoDB, Firebase.
- Tools: Git, GitHub, GitLab, Docker, VS Code, Android Studio, IntelliJ IDEA.

CONTACT: GitHub: github.com/kerthnorth | LinkedIn: linkedin.com/in/paul-kabeya-9a53b12b8

If asked how to hire you, direct them to scroll to the contact section of the portfolio or reach out via LinkedIn.`;

let history = [];
let isLoading = false;
let msgCount = 0;

const messagesEl = document.getElementById('ai-messages');
const inputEl = document.getElementById('ai-input');
const sendBtn = document.getElementById('ai-send');
const suggestionsEl = document.getElementById('ai-suggestions');
const errorBanner = document.getElementById('ai-error-banner');
const speakingIndicator = document.getElementById('speaking-indicator');

// Initial greeting
setTimeout(() => {
  addMsg('bot', "Hey — I'm Mukuna. Ask me anything about my work, background, or what I can build for you.");
}, 600);

document.querySelectorAll('.ai-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    sendMessage(chip.dataset.q);
    suggestionsEl.style.display = 'none';
  });
});

sendBtn.addEventListener('click', () => sendMessage());
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `ai-msg ${role}`;

  const av = document.createElement('div');
  av.className = 'ai-msg-avatar';
  av.textContent = role === 'bot' ? 'MK' : 'YOU';

  const bubble = document.createElement('div');
  bubble.className = 'ai-msg-bubble';
  bubble.textContent = text;

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  if (role === 'bot') {
    msgCount++;
    document.getElementById('msg-count').textContent =
      msgCount + (msgCount === 1 ? ' exchange' : ' exchanges');
  }
  return wrap;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'ai-msg bot'; wrap.id = 'typing-el';
  const av = document.createElement('div');
  av.className = 'ai-msg-avatar'; av.textContent = 'MK';
  const bubble = document.createElement('div');
  bubble.className = 'ai-msg-bubble';
  bubble.innerHTML = '<div class="ai-typing"><div class="ai-typing-dot"></div><div class="ai-typing-dot"></div><div class="ai-typing-dot"></div></div>';
  wrap.appendChild(av); wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() {
  const el = document.getElementById('typing-el');
  if (el) el.remove();
}

async function sendMessage(text) {
  const msg = text || inputEl.value.trim();
  if (!msg || isLoading) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  isLoading = true; sendBtn.disabled = true;
  suggestionsEl.style.display = 'none';

  addMsg('user', msg);
  history.push({ role: 'user', content: msg });
  addTyping();

  // Animate avatar
  speakingIndicator.classList.remove('active');
  window.setAvatarSpeaking && window.setAvatarSpeaking(false);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gemini-flash-latest',
        max_tokens: 800,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMsg('bot', reply);
      // Animate avatar speaking
      speakingIndicator.classList.add('active');
      window.setAvatarSpeaking && window.setAvatarSpeaking(true);
      setTimeout(() => {
        speakingIndicator.classList.remove('active');
        window.setAvatarSpeaking && window.setAvatarSpeaking(false);
      }, Math.min(reply.length * 50, 5000));
      errorBanner.classList.remove('visible');
    } else {
      addMsg('bot', "Something went wrong — try again.");
      errorBanner.classList.add('visible');
    }
  } catch(e) {
    removeTyping();
    addMsg('bot', "I can't reach the AI service right now. You can view my full portfolio instead.");
    errorBanner.classList.add('visible');
    console.error(e);
  }

  isLoading = false; sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
